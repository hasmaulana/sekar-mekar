        function formatRp(num) {
            return 'Rp ' + num.toLocaleString('id-ID');
        }

        function renderOrderList() {
            const list = document.getElementById('order-list');
            list.innerHTML = orders.map(order => `
                <tr class="hover:bg-slate-50 transition-all cursor-pointer" onclick="viewDetail('${order.id_pesanan}')">
                    <td class="px-6 py-4">
                        <div class="font-bold text-slate-800">${order.pelanggan.nama}</div>
                        <div class="text-[10px] text-slate-400 uppercase tracking-tighter">${order.id_pesanan}</div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="text-xs font-bold uppercase py-1 px-3 rounded-full border ${
                            order.pelanggan.metode === 'cod' ? 'bg-blue-50 text-blue-600 border-blue-100' : 
                            order.pelanggan.metode === 'kurir' ? 'bg-purple-50 text-purple-600 border-purple-100' : 
                            'bg-amber-50 text-amber-600 border-amber-100'
                        }">${order.pelanggan.metode}</span>
                    </td>
                    <td class="px-6 py-4 font-bold text-slate-700">${formatRp(order.pesanan.total_akhir)}</td>
                    <td class="px-6 py-4">
                        <span class="text-xs font-medium ${order.pesanan.status_lunas ? 'text-emerald-500' : 'text-rose-500'}">
                            <i class="fas ${order.pesanan.status_lunas ? 'fa-check-circle' : 'fa-clock'} mr-1"></i>
                            ${order.pesanan.status_lunas ? 'Lunas' : 'Menunggu'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button class="p-2 bg-emerald-50 text-emerald-600 rounded-lg hover:bg-emerald-600 hover:text-white transition-colors">
                            <i class="fas fa-receipt"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function viewDetail(id) {
            const order = orders.find(o => o.id_pesanan === id);
            if(!order) return;

            // Header Info
            document.getElementById('modal-client-name').innerText = order.pelanggan.nama;
            document.getElementById('modal-order-id').innerText = order.id_pesanan;
            document.getElementById('modal-address').innerText = order.pelanggan.alamat_lengkap;
            document.getElementById('modal-total-akhir').innerText = formatRp(order.pesanan.total_akhir);
            document.getElementById('modal-payment-status').innerText = `Sisa Tagihan: ${formatRp(order.pesanan.sisa_tagihan)}`;
            
            const badge = document.getElementById('modal-metode-badge');
            badge.innerHTML = `<span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase bg-emerald-100 text-emerald-700">${order.pelanggan.metode}</span>`;

            // Stok List
            const stokList = document.getElementById('modal-stok-list');
            stokList.innerHTML = order.kebutuhan_stok.map(s => `
                <div class="flex items-center justify-between p-3 bg-white border border-slate-100 rounded-xl shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 flex items-center justify-center rounded-lg bg-emerald-50 text-emerald-500 font-bold text-xs">
                            ${s.qty}
                        </div>
                        <div>
                            <p class="text-sm font-bold text-slate-800">${s.bunga}</p>
                            <p class="text-[10px] text-slate-400 font-medium">${s.warna}</p>
                        </div>
                    </div>
                    <span class="text-[10px] font-bold text-slate-300">TANGKAI</span>
                </div>
            `).join('');

            // Raw Data
            document.getElementById('raw-data-content').innerText = order.raw_data_pesanan;
            document.getElementById('raw-data-content').classList.add('hidden');
            document.getElementById('raw-data-chevron').classList.remove('rotate-180');

            // Generate Canvas
            generateReceipt(order);

            document.getElementById('modal-overlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function toggleRawData() {
            const content = document.getElementById('raw-data-content');
            const chevron = document.getElementById('raw-data-chevron');
            content.classList.toggle('hidden');
            chevron.classList.toggle('rotate-180');
        }

        function generateReceipt(order) {
            const canvas = document.getElementById('receipt-canvas');
            const ctx = canvas.getContext('2d');
            
            const width = 350;
            const headerHeight = 120;
            const itemHeight = 35;
            const footerHeight = 130;
            const dynamicHeight = order.kebutuhan_stok.length * itemHeight;
            
            canvas.width = width;
            canvas.height = headerHeight + dynamicHeight + footerHeight;

            // Bg
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Header Decor
            ctx.fillStyle = "#10b981";
            ctx.fillRect(0, 0, width, 10);

            // Brand
            ctx.fillStyle = "#065f46";
            ctx.font = "bold 20px Inter, Arial";
            ctx.textAlign = "center";
            ctx.fillText("SEKAR MEKAR FLORIST", width/2, 45);
            
            ctx.fillStyle = "#64748b";
            ctx.font = "10px Inter, Arial";
            ctx.fillText("Pasar Bunga Blitar • 0812-XXXX-XXXX", width/2, 60);

            // Customer Info
            ctx.textAlign = "left";
            ctx.fillStyle = "#1e293b";
            ctx.font = "bold 11px Inter, Arial";
            ctx.fillText(`PELANGGAN: ${order.pelanggan.nama.toUpperCase()}`, 25, 90);
            ctx.font = "9px Inter, Arial";
            ctx.fillStyle = "#94a3b8";
            ctx.fillText(`ID: ${order.id_pesanan}`, 25, 105);

            // Line
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = "#e2e8f0";
            ctx.beginPath();
            ctx.moveTo(25, 115); ctx.lineTo(325, 115); ctx.stroke();
            ctx.setLineDash([]);

            // Items
            let y = 135;
            ctx.fillStyle = "#475569";
            ctx.font = "bold 10px Inter, Arial";
            ctx.fillText("KEBUTUHAN STOK / ITEM", 25, y);
            y += 20;

            order.kebutuhan_stok.forEach(item => {
                ctx.fillStyle = "#1e293b";
                ctx.font = "11px Inter, Arial";
                ctx.fillText(`${item.qty}x ${item.bunga}`, 25, y);
                
                ctx.textAlign = "right";
                ctx.fillStyle = "#64748b";
                ctx.font = "italic 9px Inter, Arial";
                ctx.fillText(item.warna, 325, y);
                
                ctx.textAlign = "left";
                y += itemHeight;
            });

            // Footer Section
            y += 5;
            ctx.strokeStyle = "#e2e8f0";
            ctx.beginPath();
            ctx.moveTo(25, y); ctx.lineTo(325, y); ctx.stroke();

            y += 25;
            ctx.fillStyle = "#1e293b";
            ctx.font = "11px Inter, Arial";
            ctx.fillText("TOTAL AKHIR", 25, y);
            ctx.textAlign = "right";
            ctx.font = "bold 14px Inter, Arial";
            ctx.fillStyle = "#10b981";
            ctx.fillText(formatRp(order.pesanan.total_akhir), 325, y);

            y += 20;
            ctx.textAlign = "left";
            ctx.font = "10px Inter, Arial";
            ctx.fillStyle = "#64748b";
            ctx.fillText("SUDAH BAYAR (DP)", 25, y);
            ctx.textAlign = "right";
            ctx.fillText(formatRp(order.pesanan.dp_dibayar), 325, y);

            y += 20;
            ctx.textAlign = "left";
            ctx.font = "bold 10px Inter, Arial";
            ctx.fillStyle = order.pesanan.sisa_tagihan > 0 ? "#e11d48" : "#10b981";
            ctx.fillText("SISA TAGIHAN", 25, y);
            ctx.textAlign = "right";
            ctx.fillText(formatRp(order.pesanan.sisa_tagihan), 325, y);

            // Footer note
            y += 35;
            ctx.textAlign = "center";
            ctx.fillStyle = "#cbd5e1";
            ctx.font = "8px Inter, Arial";
            ctx.fillText("Generated by Sekar Mekar Florist Digital System", width/2, y);

            // Set up download button
            document.getElementById('btn-download').onclick = () => {
                const link = document.createElement('a');
                link.download = `Struk-${order.pelanggan.nama}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            };
        }

        window.onload = renderOrderList;
        window.onclick = function(e) {
            if(e.target == document.getElementById('modal-overlay')) closeModal();
        }
    </script>
